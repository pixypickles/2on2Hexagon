<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07131f" />
  <title>Hexa Shoot Arena</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section id="menu" class="panel">
      <h1>HEXA SHOOT ARENA</h1>
      <p class="lead">六角形の壁で跳ね返せ。2対2シュートアクション。</p>

      <div class="grid">
        <label>モード
          <select id="modeSelect">
            <option value="cpu">1P VS CPU</option>
            <option value="2p">2P対戦（キーボード）</option>
          </select>
        </label>
        <label>難易度
          <select id="difficultySelect">
            <option value="easy">EASY</option>
            <option value="normal" selected>NORMAL</option>
            <option value="hard">HARD</option>
          </select>
        </label>
        <label>試合時間
          <select id="timeSelect">
            <option value="60" selected>1分</option>
            <option value="120">2分</option>
          </select>
        </label>
        <label>自チーム
          <select id="teamSelect"></select>
        </label>
        <label>相手チーム
          <select id="opponentSelect"></select>
        </label>
        <label>必殺シュート
          <select id="specialSelect">
            <option value="hook">1：フックショット</option>
            <option value="curve">2：サイドネットカーブ</option>
            <option value="break">3：ブレイクショット</option>
            <option value="stealth">4：ステルスショット</option>
          </select>
        </label>
      </div>

      <button id="startBtn" class="primary">試合開始</button>
      <details>
        <summary>操作</summary>
        <p>左の方向パッドで移動。攻撃時は A＝ゴロパス、B＝浮き玉パス、C＝ストレート、D＝カーブ。C/Dは長押しでチャージ。必殺ゲージ満タン時はCとDを同時押し。</p>
        <p>守備時は A＝操作交代、B＝撃ち返し、C＝パンチングジャンプ、D＝キャッチジャンプ。ボール接触直前のC/D入力でジャストキャッチ。</p>
        <p>キーボード：1PはWASD＋J/K/L/;、2Pは矢印＋1/2/3/0。</p>
      </details>
    </section>

    <section id="gameScreen" class="hidden">
      <header id="hud">
        <div><span id="p1Name"></span> <strong id="score1">0</strong></div>
        <div id="timer">01:00</div>
        <div><strong id="score2">0</strong> <span id="p2Name"></span></div>
      </header>
      <div id="gaugeRow">
        <div class="gauge"><i id="gauge1"></i></div>
        <div id="statusText">KICK OFF</div>
        <div class="gauge reverse"><i id="gauge2"></i></div>
      </div>
      <div id="canvasWrap">
        <canvas id="gameCanvas" width="1280" height="720" aria-label="Hexa Shoot Arena game canvas"></canvas>
        <div id="slowFlash"></div>
      </div>
      <div id="controls">
        <div id="dpad" class="dpad" aria-label="direction pad">
          <button data-dir="up">▲</button>
          <button data-dir="left">◀</button>
          <button data-dir="right">▶</button>
          <button data-dir="down">▼</button>
        </div>
        <div id="actionButtons" class="actions">
          <button data-act="A">A</button>
          <button data-act="B">B</button>
          <button data-act="C">C</button>
          <button data-act="D">D</button>
        </div>
      </div>
      <button id="quitBtn" class="ghost">タイトルへ戻る</button>
    </section>

    <section id="result" class="panel hidden">
      <h2 id="resultTitle">RESULT</h2>
      <p id="resultScore"></p>
      <button id="rematchBtn" class="primary">再戦</button>
      <button id="menuBtn" class="ghost">タイトルへ</button>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
