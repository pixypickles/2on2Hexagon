<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Hex Arena</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hud">
  <span id="score">0 - 0</span>
  <span id="status">移動 / DASH / SHOOT</span>
</div>

<canvas id="game" width="960" height="540"></canvas>

<div id="controls">
  <div id="pad">
    <button data-dir="up,left">↖</button>
    <button data-dir="up">↑</button>
    <button data-dir="up,right">↗</button>
    <button data-dir="left">←</button>
    <button class="blank">●</button>
    <button data-dir="right">→</button>
    <button data-dir="down,left">↙</button>
    <button data-dir="down">↓</button>
    <button data-dir="down,right">↘</button>
  </div>
  <div id="actions">
    <button id="dash">DASH</button>
    <button id="shoot">SHOOT</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
